<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAVISCOPE Medical Imaging</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #667eea;
        padding: 10px;
      }
      .container {
        background: white;
        border-radius: 10px;
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        color: #2c3e50;
        margin: 10px 0;
        font-size: 1.4rem;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 15px;
        font-size: 0.9rem;
      }
      .alert {
        background: #e3f2fd;
        border: 1px solid #2196f3;
        border-radius: 5px;
        padding: 8px;
        margin: 10px 0;
        font-size: 0.8rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin: 15px 0;
      }
      .btn {
        padding: 10px 15px;
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 0.8rem;
        cursor: pointer;
        min-width: 100px;
      }
      .btn-capture {
        background: #28a745;
      }
      .btn-rotate {
        background: #17a2b8;
      }
      .btn-refresh {
        background: #ffc107;
      }
      .btn-save {
        background: #6610f2;
      }
      .btn-upload {
        background: #343a40;
      }
      .spotlight {
        border: 2px solid #2c3e50;
        border-radius: 8px;
        padding: 10px;
        margin: 15px auto;
        max-width: 90%;
      }
      #main-image {
        width: 100%;
        height: auto;
        border-radius: 4px;
      }
      .timestamp {
        background: #2c3e50;
        color: white;
        padding: 5px 10px;
        border-radius: 15px;
        display: inline-block;
        margin-top: 8px;
        font-size: 0.8rem;
      }
      .film-strip-container {
        background: #2c3e50;
        border-radius: 8px;
        padding: 10px;
        margin-top: 15px;
      }
      .film-strip {
        display: flex;
        overflow-x: auto;
        gap: 8px;
        padding: 5px 0;
      }
      .film-frame {
        width: 80px;
        height: 60px;
        border: 2px solid #bdc3c7;
        border-radius: 4px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .film-frame.active {
        border-color: #e74c3c;
      }
      .film-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .disclaimer {
        background: #fff3cd;
        border: 1px solid #ffc107;
        border-radius: 5px;
        padding: 8px;
        margin-top: 15px;
        font-size: 0.7rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>CAVISCOPE Medical Imaging</h1>
      <div class="subtitle">Internal Organ Visualization</div>

      <div class="alert">
        Image capture takes 5-10 seconds. Latest images stream automatically.
      </div>

      <div class="controls">
        <button class="btn btn-capture" onclick="capturePhoto()">
          CAPTURE
        </button>
        <button class="btn btn-rotate" onclick="rotatePhoto()">ROTATE</button>
        <button class="btn btn-refresh" onclick="refreshFrame()">
          REFRESH
        </button>
        <button class="btn btn-save" onclick="saveImage()">SAVE</button>
        <button class="btn btn-upload" onclick="uploadToDatabase()">
          UPLOAD
        </button>
      </div>

      <div class="spotlight">
        <img id="main-image" src="placeholder.jpg" alt="Medical Image" />
        <div class="timestamp" id="image-time">Loading...</div>
      </div>

      <div class="film-strip-container">
        <div class="film-strip" id="gallery"></div>
      </div>

      <div class="disclaimer">MEDICAL DEVICE: ISO 13485 & HIPAA Compliant</div>
    </div>

    <script>
      let currentRotation = 0;
      let images = [];

      function init() {
        images = Array.from({ length: 5 }, (_, i) => ({
          id: i + 1,
          src: "placeholder.jpg",
          timestamp: new Date(Date.now() - i * 300000).toLocaleTimeString(),
        }));
        renderGallery();
        updateMainImage(images[0]);
      }

      function renderGallery() {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = images
          .map(
            (img, i) =>
              `<div class="film-frame ${
                i === 0 ? "active" : ""
              }" onclick="showImage(${img.id})">
                    <img src="${img.src}" alt="Image ${img.id}">
                </div>`
          )
          .join("");
      }

      function updateMainImage(img) {
        document.getElementById("main-image").src = img.src;
        document.getElementById("image-time").textContent = img.timestamp;
      }

      function capturePhoto() {
        console.log("Capture initiated");
        // ESP32 capture logic here
      }

      function rotatePhoto() {
        currentRotation = (currentRotation + 90) % 360;
        document.getElementById(
          "main-image"
        ).style.transform = `rotate(${currentRotation}deg)`;
      }

      function refreshFrame() {
        console.log("Refresh frame");
        // ESP32 refresh logic
      }

      function saveImage() {
        const link = document.createElement("a");
        link.href = document.getElementById("main-image").src;
        link.download = "medical_image.jpg";
        link.click();
      }

      function uploadToDatabase() {
        console.log("Upload to database");
        // ESP32 upload logic
      }

      function showImage(id) {
        const img = images.find((i) => i.id === id);
        if (img) updateMainImage(img);
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
